name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build distributable
        run: npm run build

      - name: Run browser tests
        run: npm run test:e2e

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp dist/monster-mint.html release/monster-mint.html
          cp example/monster-mint.json release/monster-mint-example.json
          cp LICENSE release/LICENSE

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: monster-mint-release-html
          path: release/*
          if-no-files-found: error

  publish-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
    permissions:
      contents: write

    steps:
      - name: Download release asset artifact
        uses: actions/download-artifact@v4
        with:
          name: monster-mint-release-html
          path: release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release/*
