name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build distributable
        run: npm run build

      - name: Run browser tests
        run: npm run test:e2e

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare release assets
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p release
          cp dist/monster-mint.html "release/monster-mint-${RELEASE_TAG}.html"
          mkdir -p pages-site
          cp dist/monster-mint.html pages-site/index.html
          cp dist/monster-mint.html pages-site/monster-mint.html

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: monster-mint-release-html
          path: release/*.html
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-site

  publish-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
    permissions:
      contents: write

    steps:
      - name: Download release asset artifact
        uses: actions/download-artifact@v4
        with:
          name: monster-mint-release-html
          path: release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release/*.html

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
