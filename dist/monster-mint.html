<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monster Mint</title>
    <style>
:root {
  --bg: #f3efe5;
  --panel: #fbf7ef;
  --panel-strong: #e8dcc8;
  --panel-border: #b8ab96;
  --ink: #2b2419;
  --ink-muted: #6a5f4f;
  --accent: #9d3f1d;
  --accent-strong: #7f2f12;
  --shadow: rgba(43, 36, 25, 0.15);
  --radius: 14px;
  --radius-sm: 8px;
  --space-1: 0.4rem;
  --space-2: 0.7rem;
  --space-3: 1rem;
  --space-4: 1.4rem;
  --space-5: 2rem;
  --font-body: Georgia, "Times New Roman", serif;
  --font-ui: "Trebuchet MS", Verdana, sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 40%),
    linear-gradient(180deg, #efe5d0 0%, var(--bg) 100%);
  color: var(--ink);
  font-family: var(--font-body);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}



.app-shell {
  width: min(1200px, calc(100vw - 2rem));
  margin: 0 auto;
  padding: var(--space-2) 0 var(--space-3);
}

.app-header {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--space-2);
  margin-bottom: 0.6rem;
}

.app-brand {
  max-width: 40rem;
}

.app-title {
  margin: 0;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 1;
}

.app-subtitle {
  margin: 0.2rem 0 0;
  color: var(--ink-muted);
  font-family: var(--font-ui);
}

.app-status {
  display: inline-block;
  margin: 0.35rem 0 0;
  padding: 0.2rem 0.55rem;
  border-radius: 999px;
  font-family: var(--font-ui);
  font-size: 0.84rem;
  line-height: 1.3;
}

.app-status.is-muted {
  color: var(--ink-muted);
  background: rgba(184, 171, 150, 0.15);
}

.app-status.is-saved {
  color: #2f5a26;
  background: rgba(134, 181, 116, 0.18);
}

.app-status.is-editing {
  color: #7a5c1e;
  background: rgba(227, 196, 120, 0.22);
}

.app-status.is-error {
  color: #7d1f1f;
  background: rgba(208, 94, 94, 0.2);
}

.app-menu {
  display: flex;
  align-items: center;
  align-self: flex-start;
  gap: 0.6rem;
}

.button {
  border: 1px solid var(--panel-border);
  border-radius: 999px;
  padding: 0.6rem 0.95rem;
  background: #fffdfa;
  color: var(--ink);
  font-family: var(--font-ui);
}

.button-primary {
  background: var(--accent);
  border-color: var(--accent-strong);
  color: #fff8f0;
}

.menu-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.7rem;
  height: 2.7rem;
  border: 1px solid rgba(184, 171, 150, 0.9);
  border-radius: 0.85rem;
  background: rgba(255, 253, 250, 0.88);
  box-shadow: 0 8px 18px rgba(96, 73, 33, 0.12);
  color: var(--ink);
  font-size: 1.1rem;
}

.menu-button.is-active {
  background: var(--panel);
  border-color: var(--accent);
  color: var(--accent-strong);
}

.tabs {
  display: flex;
  gap: 0.2rem;
  margin-bottom: var(--space-2);
  padding: 0 0.5rem;
  border-bottom: 1px solid rgba(184, 171, 150, 0.8);
}

.tab-button {
  border: 1px solid transparent;
  border-bottom: 0;
  background: transparent;
  border-radius: 0.9rem 0.9rem 0 0;
  padding: 0.85rem 1.15rem 0.75rem;
  font-family: var(--font-ui);
  color: var(--ink-muted);
  margin-bottom: -1px;
}

.tab-button.is-active {
  background: rgba(251, 247, 239, 0.96);
  border-color: rgba(184, 171, 150, 0.9);
  color: var(--accent-strong);
  box-shadow: 0 -1px 0 rgba(251, 247, 239, 0.96) inset;
}

.tab-panel {
  display: none;
  background: rgba(251, 247, 239, 0.92);
  border: 1px solid var(--panel-border);
  border-radius: var(--radius);
  padding: var(--space-3);
  box-shadow: 0 18px 36px var(--shadow);
}

.tab-panel.is-active {
  display: block;
}

.help-overlay {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

.help-overlay.is-visible {
  display: flex;
}

.help-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(42, 31, 16, 0.38);
  backdrop-filter: blur(3px);
}

.help-dialog {
  position: relative;
  z-index: 1;
  width: min(34rem, calc(100vw - 2rem));
  max-height: calc(100vh - 2rem);
  overflow: auto;
  background: rgba(255, 252, 246, 0.98);
  border: 1px solid rgba(184, 171, 150, 0.9);
  border-radius: var(--radius);
  box-shadow: 0 22px 44px var(--shadow);
}

.help-dialog-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-2);
  padding: var(--space-2);
  border-bottom: 1px solid rgba(184, 171, 150, 0.75);
}

.help-dialog-body {
  padding: var(--space-2);
}

.hotkey-list {
  display: grid;
  gap: 0.8rem;
  margin: 0;
}

.hotkey-list div {
  display: grid;
  grid-template-columns: minmax(9rem, auto) 1fr;
  gap: 0.75rem;
  align-items: start;
}

.hotkey-list dt,
.hotkey-list dd {
  margin: 0;
}

.hotkey-list kbd {
  display: inline-block;
  min-width: 2rem;
  padding: 0.2rem 0.45rem;
  border: 1px solid rgba(184, 171, 150, 0.9);
  border-radius: 0.45rem;
  background: #fffdfa;
  box-shadow: inset 0 -1px 0 rgba(184, 171, 150, 0.45);
  font-family: var(--font-ui);
  font-size: 0.92rem;
  text-align: center;
}

.panel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: var(--space-2);
}

.settings-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  align-items: start;
}

.settings-shell {
  display: grid;
  gap: var(--space-3);
}

.settings-shell.has-drawer {
  grid-template-columns: minmax(0, 1fr) 360px;
  align-items: start;
}

.settings-main {
  min-width: 0;
}

.panel-card {
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(184, 171, 150, 0.85);
  border-radius: var(--radius);
  padding: var(--space-2);
}

.editor-drawer {
  position: sticky;
  top: var(--space-2);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 2rem);
  min-height: 0;
  overflow: hidden;
  background: rgba(255, 252, 246, 0.96);
  border: 1px solid rgba(184, 171, 150, 0.9);
  border-radius: var(--radius);
  box-shadow: 0 18px 36px var(--shadow);
}

.drawer-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-2);
  padding: var(--space-2);
  border-bottom: 1px solid rgba(184, 171, 150, 0.75);
}

.drawer-eyebrow {
  margin: 0 0 0.2rem;
  color: var(--ink-muted);
  font-family: var(--font-ui);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.drawer-header h2 {
  margin: 0;
}

.drawer-body {
  display: grid;
  gap: var(--space-2);
  padding: var(--space-2);
  min-height: 0;
  overflow-y: auto;
}

.panel-card h2,
.panel-card h3 {
  margin-top: 0;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}

.panel-header h2 {
  margin: 0;
}

.placeholder-list {
  margin: 0;
  padding-left: 1.2rem;
  color: var(--ink-muted);
}

.empty-state {
  padding: var(--space-4);
  border: 1px dashed var(--panel-border);
  border-radius: var(--radius);
  text-align: center;
  color: var(--ink-muted);
}

@media (max-width: 720px) {
  .app-shell {
    width: min(100vw - 1rem, 1200px);
    padding-top: var(--space-2);
  }

  .tabs {
    overflow-x: auto;
    padding-inline: 0;
  }

  .settings-grid {
    grid-template-columns: 1fr;
  }

  .settings-shell.has-drawer {
    grid-template-columns: 1fr;
  }

  .editor-drawer {
    position: static;
  }

  .help-overlay {
    padding: 0.75rem;
  }

  .hotkey-list div {
    grid-template-columns: 1fr;
  }
}


.form-grid {
  display: grid;
  gap: var(--space-2);
}

.field-row {
  display: grid;
  gap: var(--space-2);
}

.field-row.two-up {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field-row.three-up {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.field {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  font-family: var(--font-ui);
  font-size: 0.92rem;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  padding: 0.55rem 0.7rem;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  background: #fffdfa;
}

.field textarea {
  min-height: 5.25rem;
  resize: vertical;
}

.color-picker-field {
  gap: 0.45rem;
}

.color-picker {
  width: 100%;
}

.color-picker-summary {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.55rem 0.7rem;
  border: 1px solid var(--panel-border);
  border-radius: var(--radius-sm);
  background: #fffdfa;
  cursor: pointer;
  list-style: none;
}

.color-picker-summary::-webkit-details-marker {
  display: none;
}

.color-picker-swatch {
  width: 1rem;
  height: 1rem;
  border-radius: 999px;
  border: 1px solid rgba(43, 36, 25, 0.2);
  background: var(--swatch);
  flex: 0 0 auto;
}

.color-picker-panel {
  display: grid;
  gap: 0.6rem;
  margin-top: 0.45rem;
  padding: 0.7rem;
  border: 1px solid rgba(184, 171, 150, 0.8);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.92);
}

.checkbox-field {
  flex-direction: row;
  align-items: center;
  gap: 0.55rem;
}

.checkbox-field input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.sequence-manager {
  display: grid;
  gap: var(--space-2);
}

.sequence-summary {
  margin: 0;
  color: var(--ink-muted);
  font-family: var(--font-ui);
  font-size: 0.9rem;
}

.sequence-editor {
  padding-top: var(--space-2);
  border-top: 1px solid rgba(184, 171, 150, 0.7);
}

.field-help {
  color: var(--ink-muted);
  font-size: 0.84rem;
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
}

.project-actions {
  align-items: center;
}

.sequence-list {
  display: grid;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.sequence-item {
  display: grid;
  gap: 0.5rem;
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(184, 171, 150, 0.85);
  border-radius: var(--radius-sm);
  padding: 0.8rem;
}

.sequence-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}

.sequence-item-name {
  margin: 0;
  font-size: 1rem;
}

.sequence-item-meta {
  margin: 0;
  color: var(--ink-muted);
  font-family: var(--font-ui);
  font-size: 0.9rem;
}

.transfer-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 720px) {
  .field-row.two-up,
  .field-row.three-up {
    grid-template-columns: 1fr;
  }
}


.designer-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: var(--space-2);
  align-items: start;
}

.designer-main {
  display: grid;
  gap: var(--space-2);
  min-width: 0;
}

.designer-toolbar-card {
  padding-bottom: var(--space-1);
}

.designer-toolbar {
  display: grid;
  gap: 0.8rem;
}

.designer-toolbar-row {
  display: flex;
  flex-wrap: wrap;
  align-items: end;
  gap: 0.8rem;
}

.component-row {
  padding-top: 0.2rem;
  border-top: 1px solid rgba(184, 171, 150, 0.55);
}

.toolbar-field {
  min-width: 12rem;
  flex: 1 1 12rem;
}

.designer-drawer .drawer-section + .drawer-section {
  padding-top: var(--space-2);
  border-top: 1px solid rgba(184, 171, 150, 0.7);
}

.designer-drawer {
  align-self: start;
  top: 0;
  max-height: var(--designer-drawer-max-height, calc(100vh - 14rem));
}

.designer-drawer .drawer-body {
  overscroll-behavior: contain;
}

.designer-drawer .drawer-section h3 {
  margin: 0 0 0.85rem;
}

.preview-shell {
  display: grid;
  gap: var(--space-2);
}

.preview-stage {
  position: relative;
  width: min(100%, 640px, calc(100vh - 29.5rem));
  aspect-ratio: 1;
  margin: 0 auto;
  padding: 0.85rem;
  border-radius: 24px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.72), transparent 32%),
    linear-gradient(45deg, rgba(184, 171, 150, 0.18) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(184, 171, 150, 0.18) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(184, 171, 150, 0.18) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(184, 171, 150, 0.18) 75%);
  background-size: auto, 32px 32px, 32px 32px, 32px 32px, 32px 32px;
  background-position: 0 0, 0 0, 0 16px, 16px -16px, -16px 0;
  border: 1px solid rgba(184, 171, 150, 0.85);
}

.preview-stage svg {
  display: block;
  width: 100%;
  height: 100%;
}

.face-toggle {
  display: inline-flex;
  border: 1px solid var(--panel-border);
  border-radius: 999px;
  overflow: hidden;
}

.face-toggle button {
  border: 0;
  background: rgba(255, 255, 255, 0.72);
  padding: 0.55rem 0.85rem;
  font-family: var(--font-ui);
}

.face-toggle button.is-active {
  background: var(--accent);
  color: #fff8f0;
}

.icon-trash {
  min-width: 2.7rem;
  padding-inline: 0.8rem;
}

.preview-note {
  margin: 0;
  color: var(--ink-muted);
  font-family: var(--font-ui);
  font-size: 0.85rem;
  text-align: center;
}

.designer-placeholder {
  min-height: 320px;
}

@media (max-width: 1080px) {
  .designer-shell {
    grid-template-columns: 1fr;
  }

  .designer-drawer {
    position: static;
    max-height: none;
  }
}

@media (max-height: 860px) {
  .preview-stage {
    width: min(100%, 560px, calc(100vh - 27.5rem));
  }
}


.print-layout {
  display: grid;
  gap: var(--space-3);
  min-width: 0;
}

.print-layout > * {
  min-width: 0;
}

.print-panel {
  min-width: 0;
}

.print-panel-header {
  margin-bottom: 0;
}

.print-panel.is-open .print-panel-header {
  margin-bottom: var(--space-2);
}

.panel-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  flex: 1 1 auto;
  min-width: 0;
  padding: 0;
  border: 0;
  background: transparent;
  color: inherit;
  text-align: left;
}

.panel-toggle-label {
  display: grid;
  gap: 0.15rem;
  min-width: 0;
}

.panel-toggle h2 {
  min-width: 0;
  margin: 0;
}

.panel-toggle-meta {
  color: var(--ink-muted);
  font-family: var(--font-ui);
  font-size: 0.9rem;
}

.panel-toggle-icon {
  flex: 0 0 auto;
  color: var(--ink-muted);
}

.print-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
}

.print-table th,
.print-table td {
  padding: 0.6rem;
  border-bottom: 1px solid rgba(184, 171, 150, 0.7);
  text-align: left;
}

.print-table input {
  width: 5.5rem;
}

.preview-page-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: var(--space-2);
}

.preview-tab-list {
  display: flex;
  flex-wrap: nowrap;
  gap: 0.2rem;
  margin-bottom: var(--space-2);
  padding: 0 0.5rem;
  border-bottom: 1px solid rgba(184, 171, 150, 0.8);
  box-sizing: border-box;
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
}

.preview-tab {
  flex: 0 0 auto;
  border: 1px solid transparent;
  border-bottom: 0;
  border-radius: 0.9rem 0.9rem 0 0;
  padding: 0.75rem 1rem 0.65rem;
  background: transparent;
  font-family: var(--font-ui);
  color: var(--ink-muted);
  margin-bottom: -1px;
}

.preview-tab.is-active {
  background: rgba(251, 247, 239, 0.96);
  border-color: rgba(184, 171, 150, 0.9);
  color: var(--accent-strong);
  box-shadow: 0 -1px 0 rgba(251, 247, 239, 0.96) inset;
}

.preview-page-card {
  display: grid;
  gap: 0.6rem;
}

.preview-page-label {
  margin: 0;
  font-family: var(--font-ui);
  color: var(--ink-muted);
}

.preview-page-svg {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  box-sizing: border-box;
  border: 1px solid rgba(184, 171, 150, 0.85);
  border-radius: var(--radius-sm);
  background: #fff;
}

    </style>

    <div id="app"></div>
    <script>
(function (global, factory) {

  global.MonsterMintSchema = api;
  if (typeof module !== "undefined" && module.exports) {

})(typeof globalThis !== "undefined" ? globalThis : window, function () {
  var STORAGE_KEY = "monster-mint.project.v1";
  var UI_STORAGE_KEY = "monster-mint.ui.v1";
  var PROJECT_VERSION = 1;
  var PAGE_PRESETS = [
    { id: "letter", label: "US Letter", widthIn: 8.5, heightIn: 11 },
    { id: "a4", label: "A4", widthIn: 8.27, heightIn: 11.69 }
  ];
  var TOKEN_SIZES = [0.5, 1, 2, 3, 4, 5];
  var BUILT_IN_TEXT_SEQUENCES = [
    {
      id: "builtin_text_numeric",
      name: "Numeric",
      builtIn: true,
      type: "numeric"

    {
      id: "builtin_text_alphabet",
      name: "Alphabet",
      builtIn: true,
      type: "alphabetic"
    }
  ];
  var BUILT_IN_COLOR_SEQUENCES = [
    {
      id: "builtin_color_rainbow",

      builtIn: true,
      values: ["#ff0000", "#ff7f00", "#ffff00", "#00aa00", "#0000ff", "#4b0082", "#8b00ff"]
    },
    {
      id: "builtin_color_primary",
      name: "Primary Colors",
      builtIn: true,
      values: ["#ff0000", "#ffff00", "#0000ff"]
    }
  ];

  function createDefaultTextDefaults() {
    return {
      fontFamily: "Times New Roman",
      fontWeight: "700",
      colorMode: "manual",
      color: "#ffffff",
      colorSequenceRef: null,
      textBorder: {
        width: 3,
        colorMode: "manual",
        color: "#000000",
        colorSequenceRef: null
      }
    };
  }

  function createDefaultTokenDefaults() {
    return {
      diameterIn: 1,
      backgroundMode: "color",
      backgroundColorMode: "manual",
      backgroundColor: "#f3e7c9",
      backgroundColorSequenceRef: null,
      backgroundImageSource: "",
      borderWidthRatio: 0.03,
      borderColorMode: "manual",
      borderColor: "#000000",
      borderColorSequenceRef: null
    };
  }

  function timestamp() {
    return new Date().toISOString();
  }

  function createDefaultProject() {
    return {
      version: PROJECT_VERSION,
      meta: {
        name: "Untitled Project",
        updatedAt: timestamp()
      },
      settings: {
        pagePresetId: "letter",
        pageOrientation: "portrait",
        pageMarginIn: 0.25,
        cutlineGapMm: 0,
        imageTrimAlphaThreshold: 1,
        tokenDefaults: createDefaultTokenDefaults(),
        textDefaults: createDefaultTextDefaults()
      },
      sequences: {
        text: clone(BUILT_IN_TEXT_SEQUENCES),

  function renderTokenOptions(tokens, selectedTokenId) {
    return tokens.slice().sort(function (left, right) {
      return naturalLabelCompare(left.name + " (" + left.diameterIn + '")', right.name + " (" + right.diameterIn + '")');
    }).map(function (token) {
      return '<option value="' + token.id + '"' + (token.id === selectedTokenId ? " selected" : "") + ">" + escapeHtml(token.name) + " (" + token.diameterIn + '&quot;)</option>';
    }).join("");
  }

  function getComponentItems(face) {
    return Tokens.getSortedFaceComponents(face, "desc").map(function (entry) {
      var component = entry.component;
      return {
        type: entry.type,
        id: component.id,
        label: component.name || (entry.type === "image" ? "Image" : "Text")
      };
    });
  }

  function renderComponentOptions(items, selectedType, selectedId) {
    return ['<option value="">' + "Token settings" + "</option>"].concat(items.slice().sort(function (left, right) {
      return naturalLabelCompare(left.label, right.label);
    }).map(function (item) {
      var isSelected = selectedType === item.type && selectedId === item.id;
      return '<option value="' + item.type + ":" + item.id + '"' + (isSelected ? " selected" : "") + ">" + escapeHtml(item.label) + "</option>";
    })).join("");
  }

  function canDeleteSelectedComponent(selection) {

        return Number(left) - Number(right);

        return '<option value="' + size + '"' + (size === token.diameterIn ? " selected" : "") + ">" + size + '&quot;</option>';
      }).join("") + "</select></label>",
      '  <p class="field-help">Editing token appearance.</p>',
      helpers.renderBackgroundControls({
        modeName: "backgroundMode",
        currentMode: face.backgroundMode,

        sourceName: "backgroundColorSource",
        colorName: "backgroundColor",
        currentColorMode: face.backgroundColorMode,
        currentColor: face.backgroundColor,

      }),
      '  <label class="field">Border width<input type="range" min="0" max="0.25" step="0.01" name="borderWidthRatio" value="' + face.border.widthRatio.toFixed(2) + '"><span class="field-help">' + Math.round(face.border.widthRatio * 100) + '% of token width</span></label>',
      helpers.renderColorPicker({
        label: "Token border",
        sourceName: "borderColorSource",

  function renderSelectedComponentForm(component, selection, project, helpers) {
    if (!component) {
      return '<div class="empty-state">Select a component to edit it.</div>';
    }

    if (selection.selectedComponentType === "text") {
      return renderTextComponentForm(component, selection, project, helpers);
    }

    return renderImageComponentForm(component, selection);
  }

  function renderTextComponentForm(component, selection, project, helpers) {
    return [
      '<form class="form-grid" data-form="text-component-settings">',
      '  <label class="field">Label<input name="name" value="' + escapeHtml(component.name || "Text") + '"></label>',
      renderZOrderControls(component, selection),
      '  <label class="field">Content mode<select name="contentMode">' + helpers.renderTextContentModeOptions(component.contentMode) + "</select></label>",
      helpers.renderConditionalField("contentMode:custom", component.contentMode === "custom", 'Text<input name="customText" value="' + escapeHtml(component.customText) + '">'),
      helpers.renderConditionalBlock("contentMode:numeric|alphabetic", component.contentMode === "numeric" || component.contentMode === "alphabetic", [
        '<div class="field-row two-up">',
        '  <label class="field">Start<input type="number" step="1" name="sequenceStart" value="' + component.sequenceStart + '"></label>',
        component.contentMode === "numeric"

        "</div>"
      ].join("")),
      '  <div class="field-row two-up">',
      '    <label class="field">Font family<select name="fontFamily">' + helpers.renderFontFamilyOptions(component.fontFamily) + "</select></label>",
      '    <label class="field">Font weight<select name="fontWeight">' + helpers.renderFontWeightOptions(component.fontWeight) + "</select></label>",
      "  </div>",
      '  <label class="field">Rotation<input type="number" min="0" max="360" step="1" name="rotationDeg" value="' + Math.round(Number(component.rotationDeg || 0)) + '"><span class="field-help">Degrees clockwise.</span></label>',
      helpers.renderColorPicker({
        label: "Text color",
        sourceName: "colorSource",
        colorName: "color",
        currentMode: component.colorMode,
        currentColor: component.color,
        currentSequenceRef: component.colorSequenceRef,
        sequences: project.sequences.color

      renderTextBorderFields(component.textBorder, project, helpers),

  function renderImageComponentForm(component, selection) {
    return [
      '<form class="form-grid" data-form="image-component-settings">',
      '  <label class="field">Label<input name="name" value="' + escapeHtml(component.name) + '"></label>',
      renderZOrderControls(component, selection),
      renderPositionFields(component),
      '  <label class="field">Scale<input type="range" min="0.05" max="2" step="0.01" name="scale" value="' + component.scale.toFixed(2) + '"><span class="field-help">' + Math.round(component.scale * 100) + '% of max circle diameter</span></label>',
      '  <label class="field">Rotation<input type="number" min="0" max="360" step="1" name="rotationDeg" value="' + Math.round(Number(component.rotationDeg || 0)) + '"><span class="field-help">Degrees clockwise.</span></label>',
      '  <div class="field-row two-up">',
      '    <label class="field checkbox-field"><input type="checkbox" name="mirrorX"' + (component.mirrorX ? " checked" : "") + '>Mirror horizontally</label>',
      '    <label class="field checkbox-field"><input type="checkbox" name="mirrorY"' + (component.mirrorY ? " checked" : "") + '>Mirror vertically</label>',
      "  </div>",
      '  <div class="button-row">',
      '    <button class="button" type="button" data-action="replace-image">Replace Image</button>',
      '    <input class="visually-hidden" type="file" accept="image/*" data-replace-image-input>',
      '    <span class="field-help">Changes save automatically.</span>',
      "  </div>",
      "</form>"

  }

  function renderZOrderControls(component, selection) {

      '<div class="field">',
      '  <span>Z-order</span>',
      '  <div class="button-row">',

  function renderPositionFields(component) {

      '  <label class="field">Height<input type="number" min="0.05" max="2.5" step="0.01" name="height" value="' + component.height.toFixed(2) + '"></label>',
      "</div>"
    ].join("");
  }

  function renderTextBorderFields(textBorder, project, helpers) {
    return [
      '<label class="field">Text border<input type="number" min="0" max="8" step="0.1" name="textBorderWidth" value="' + textBorder.width + '"><span class="field-help">0 turns it off.</span></label>',
      helpers.renderColorPicker({
        label: "Text border color",
        sourceName: "textBorderColorSource",
        colorName: "textBorderColor",
        currentMode: textBorder.colorMode,
        currentColor: textBorder.color,
        currentSequenceRef: textBorder.colorSequenceRef,
        sequences: project.sequences.color
      })
    ].join("");
  }

  function bindForms(appElement, store, helpers) {
    var selectedTokenField = appElement.querySelector('[name="selectedTokenId"]');
    if (selectedTokenField) {
      selectedTokenField.addEventListener("change", function () {
        store.updateUi(function (ui) {
          ui.selectedTokenId = selectedTokenField.value || null;
          ui.selectedComponentType = null;
          ui.selectedComponentId = null;
        });
      });
    }

    var tokenForm = appElement.querySelector("[data-form='token-settings']");
    if (tokenForm) {
      tokenForm.querySelectorAll('select[name="backgroundMode"], select[name="backgroundColorSource"], select[name="borderColorSource"]').forEach(function (element) {
        element.addEventListener("change", function () {
          helpers.syncConditionalFields(tokenForm, {
            backgroundMode: tokenForm.querySelector('[name="backgroundMode"]').value,
            backgroundColorSource: tokenForm.querySelector('[name="backgroundColorSource"]').value,
            borderColorSource: tokenForm.querySelector('[name="borderColorSource"]').value
          }, helpers.conditionalFieldPreserve);
        });
      });
      helpers.syncConditionalFields(tokenForm, {
        backgroundMode: tokenForm.querySelector('[name="backgroundMode"]').value,
        backgroundColorSource: tokenForm.querySelector('[name="backgroundColorSource"]').value,
        borderColorSource: tokenForm.querySelector('[name="borderColorSource"]').value
      }, helpers.conditionalFieldPreserve);
      tokenForm.addEventListener("change", function () {
        var selection = helpers.getDesignerSelection(store.getState());
        if (!selection.token) {
          return;
        }
        var formData = new FormData(tokenForm);
        store.updateProject(function (project) {
          var token = helpers.findToken(project, selection.token.id);
          var face = token.front;
          var backgroundColorSelection = helpers.parseColorSourceValue(formData.get("backgroundColorSource"));
          var borderColorSelection = helpers.parseColorSourceValue(formData.get("borderColorSource"));
          token.name = String(formData.get("name")) || token.name;
          token.diameterIn = Number(formData.get("diameterIn")) || token.diameterIn;
          face.backgroundMode = String(formData.get("backgroundMode")) === "image" ? "image" : "color";
          face.backgroundColorMode = backgroundColorSelection.mode;
          face.backgroundColor = String(formData.get("backgroundColor") || face.backgroundColor);
          face.backgroundColorSequenceRef = backgroundColorSelection.sequenceRef;
          face.border.widthRatio = helpers.toNumberOrDefault(formData.get("borderWidthRatio"), face.border.widthRatio);
          face.border.colorMode = borderColorSelection.mode;
          face.border.color = String(formData.get("borderColor") || face.border.color);
          face.border.colorSequenceRef = borderColorSelection.sequenceRef;
        });
      });

      helpers.bindBackgroundUploadControls(tokenForm, {
        inputSelector: "[data-token-background-input]",
        importOptions: helpers.getImageImportOptions(store.getState().project),
        onUpload: function (imageAsset) {
          var selection = helpers.getDesignerSelection(store.getState());
          if (!selection.token) {
            return;
          }
          store.updateProject(function (project) {
            var token = helpers.findToken(project, selection.token.id);
            if (!token) {
              return;
            }
            token.front.backgroundMode = "image";
            token.front.backgroundImageSource = imageAsset.source;
          });
        }
      });
    }

    var addImageInput = appElement.querySelector("[data-image-upload-input]");
    if (addImageInput) {
      addImageInput.addEventListener("change", async function () {
        var file = addImageInput.files && addImageInput.files[0];
        var selection = helpers.getDesignerSelection(store.getState());
        if (!file || !selection.token) {
          return;
        }
        try {
          var imageAsset = await helpers.readImageAssetFile(file, helpers.getImageImportOptions(store.getState().project));
          var component = Tokens.createImageComponent({
            source: imageAsset.source,
            name: file.name,
            aspectRatio: imageAsset.width / imageAsset.height,
            zIndex: Tokens.getNextComponentZ(selection.token.front)
          });
          store.updateProject(function (project) {
            var token = helpers.findToken(project, selection.token.id);
            token.front.images.push(component);
          });
          store.updateUi(function (ui) {
            ui.selectedComponentType = "image";
            ui.selectedComponentId = component.id;
          });
        } catch (error) {
          runtimeGlobal.alert("Image import failed.");
          console.error(error);
        } finally {
          addImageInput.value = "";
        }
      });
    }

    var selectedComponentField = appElement.querySelector('[name="selectedComponentKey"]');
    if (selectedComponentField) {
      selectedComponentField.addEventListener("change", function () {
        var parts = selectedComponentField.value.split(":");
        store.updateUi(function (ui) {
          ui.selectedComponentType = parts[0] || null;
          ui.selectedComponentId = parts[0] ? parts.slice(1).join(":") : null;
        });
      });
    }

    var textComponentForm = appElement.querySelector("[data-form='text-component-settings']");
    if (textComponentForm) {
      var syncTextComponentVisibility = function () {
        var contentModeField = textComponentForm.querySelector('[name="contentMode"]');
        var colorSourceField = textComponentForm.querySelector('[name="colorSource"]');
        var textBorderColorSourceField = textComponentForm.querySelector('[name="textBorderColorSource"]');
        helpers.syncConditionalFields(textComponentForm, {
          contentMode: contentModeField ? contentModeField.value : null,
          colorSource: colorSourceField ? colorSourceField.value : null,
          textBorderColorSource: textBorderColorSourceField ? textBorderColorSourceField.value : null
        }, helpers.conditionalFieldPreserve);
      };
      textComponentForm.querySelectorAll('select[name="contentMode"], select[name="colorSource"], select[name="textBorderColorSource"]').forEach(function (element) {
        element.addEventListener("change", syncTextComponentVisibility);
      });
      syncTextComponentVisibility();

      textComponentForm.addEventListener("change", function () {
        var selection = helpers.getDesignerSelection(store.getState());
        if (!selection.token || selection.selectedComponentType !== "text") {
          return;
        }
        var formData = new FormData(textComponentForm);
        store.updateProject(function (project) {
          var component = helpers.findComponent(project, selection, "text");
          if (!component) {
            return;
          }
          var textColorSelection = helpers.parseColorSourceValue(formData.get("colorSource"));
          var textBorderColorSelection = helpers.parseColorSourceValue(formData.get("textBorderColorSource"));
          component.name = String(formData.get("name") || component.name);
          component.contentMode = String(formData.get("contentMode"));
          component.customText = String(formData.get("customText") || "");
          component.sequenceStart = helpers.toIntegerOrDefault(formData.get("sequenceStart"), component.sequenceStart);
          component.sequencePad = helpers.toNonNegativeInteger(formData.get("sequencePad"), component.sequencePad);
          component.fontFamily = String(formData.get("fontFamily") || component.fontFamily);
          component.fontWeight = String(formData.get("fontWeight") || component.fontWeight);
          component.colorMode = textColorSelection.mode;
          component.color = String(formData.get("color") || component.color);
          component.colorSequenceRef = textColorSelection.sequenceRef;
          component.rotationDeg = helpers.toNumberOrDefault(formData.get("rotationDeg"), component.rotationDeg);
          helpers.applyBoundsFromForm(component, formData);
          component.textBorder.width = helpers.toNumberOrDefault(formData.get("textBorderWidth"), component.textBorder.width);
          component.textBorder.colorMode = textBorderColorSelection.mode;
          component.textBorder.color = String(formData.get("textBorderColor") || component.textBorder.color);
          component.textBorder.colorSequenceRef = textBorderColorSelection.sequenceRef;
        });
      });
    }

    var imageComponentForm = appElement.querySelector("[data-form='image-component-settings']");
    if (imageComponentForm) {
      imageComponentForm.addEventListener("change", function () {
        var selection = helpers.getDesignerSelection(store.getState());
        if (!selection.token || selection.selectedComponentType !== "image") {
          return;
        }
        var formData = new FormData(imageComponentForm);
        store.updateProject(function (project) {
          var component = helpers.findComponent(project, selection, "image");
          if (!component) {
            return;
          }
          component.name = String(formData.get("name") || component.name);
          Tokens.updateImageComponent(component, {
            x: helpers.toNumberOrDefault(formData.get("x"), component.x),
            y: helpers.fromDisplayCenterY(formData.get("y"), component.y),
            scale: helpers.toNumberOrDefault(formData.get("scale"), component.scale),
            rotationDeg: helpers.toNumberOrDefault(formData.get("rotationDeg"), component.rotationDeg),
            mirrorX: formData.get("mirrorX") === "on",
            mirrorY: formData.get("mirrorY") === "on"
          });
        });
      });

      var replaceImageInput = imageComponentForm.querySelector("[data-replace-image-input]");
      if (replaceImageInput) {
        replaceImageInput.addEventListener("change", async function () {
          var file = replaceImageInput.files && replaceImageInput.files[0];
          var selection = helpers.getDesignerSelection(store.getState());
          if (!file || !selection.token || selection.selectedComponentType !== "image") {
            return;
          }
          try {
            var imageAsset = await helpers.readImageAssetFile(file, helpers.getImageImportOptions(store.getState().project));
            store.updateProject(function (project) {
              var component = helpers.findComponent(project, selection, "image");
              if (component) {
                component.source = imageAsset.source;
                component.name = file.name;
                component.aspectRatio = imageAsset.width / imageAsset.height;
              }
            });
          } catch (error) {
            runtimeGlobal.alert("Image import failed.");
            console.error(error);
          } finally {
            replaceImageInput.value = "";
          }
        });
      }
    }
  }

  return {
    renderPanel: renderPanel,
    bindForms: bindForms,
    canDeleteSelectedComponent: canDeleteSelectedComponent
  };
});

  function updateShellState(appView, uiState) {
    var activeTab = uiState.activeTab;
    if (appView.settingsButton) {
      appView.settingsButton.classList.toggle("is-active", activeTab === "settings");
    }
    if (appView.helpButton) {
      appView.helpButton.classList.toggle("is-active", uiState.showHelp === true);
    }
    if (appView.helpDialog) {
      appView.helpDialog.hidden = uiState.showHelp !== true;
      appView.helpDialog.classList.toggle("is-visible", uiState.showHelp === true);
    }
    updateSaveStatus(appView, mountedStore ? mountedStore.getState() : null);

    Object.keys(appView.panels).forEach(function (tabId) {
      var panel = appView.panels[tabId];
      if (panel) {
        panel.classList.toggle("is-active", tabId === activeTab);
      }
    });

    TAB_CONFIG.forEach(function (tab) {
      var button = appView.tabButtons[tab.id];
      if (!button) {
        return;
      }
      var isActive = tab.id === activeTab;
      button.classList.toggle("is-active", isActive);
      button.setAttribute("aria-selected", isActive ? "true" : "false");

  function updatePanelContent(appView, tabId, nextHtml, store) {
    var panel = appView.panels[tabId];
    if (!panel || appView.panelHtml[tabId] === nextHtml) {
      return;
    }

    panel.innerHTML = nextHtml;
    appView.panelHtml[tabId] = nextHtml;
    bindPanelForms(tabId, appView.appElement, store);

  function updateSaveStatus(appView, state) {
    if (!appView.saveStatus || !state) {
      return;
    }

    var status = state.autosaveStatus || "Loaded";
    var text = status === "Error"
      ? (state.autosaveErrorMessage || "Changes could not be saved.")
      : status === "Saving"
        ? "Saving to this browser..."
      : status === "Editing"
        ? "Unsaved changes"
        : status === "Saved"
          ? "Saved to this browser"
          : "Loaded from this browser";
    var className = "app-status" + (
      status === "Error"
        ? " is-error"
        : status === "Saving"
          ? " is-editing"
        : status === "Editing"
          ? " is-editing"
          : status === "Saved"
            ? " is-saved"
            : " is-muted"
    );

    appView.saveStatus.className = className;
    appView.saveStatus.textContent = text;
  }

  function bindPanelForms(tabId, appElement, store) {
    if (tabId === "settings") {

    if (tabId === "designer") {
      DesignerPanel.bindForms(appElement, store, DESIGNER_PANEL_HELPERS);

  function handleGlobalPointerMove(event) {
    if (!designerInteraction || !mountedStore) {
      return;
    }

    setDesignerTransientPreview(buildDesignerInteractionState(designerInteraction, event));
  }

  function handleGlobalPointerUp() {
    if (!designerInteraction || !mountedStore) {
      return;
    }

    designerInteraction = null;
    if (designerWheelPersistTimer) {
      runtimeGlobal.clearTimeout(designerWheelPersistTimer);
      designerWheelPersistTimer = null;
    }
    commitDesignerTransientPreview();
  }

  function scheduleDesignerPersist() {
    if (designerWheelPersistTimer) {
      runtimeGlobal.clearTimeout(designerWheelPersistTimer);
    }
    designerWheelPersistTimer = runtimeGlobal.setTimeout(function () {
      designerWheelPersistTimer = null;
      commitDesignerTransientPreview();
    }, 180);
  }

  function buildDesignerInteractionState(interaction, event) {
    var deltaX = (event.clientX - interaction.startClientX) / interaction.previewRect.width;
    var deltaY = (event.clientY - interaction.startClientY) / interaction.previewRect.height;
    var state = {
      tokenId: interaction.tokenId,
      componentId: interaction.componentId,
      componentType: interaction.componentType
    };

    if (
      interaction.mode === "resize" ||
      interaction.mode === "resize-top" ||
      interaction.mode === "resize-bottom" ||
      interaction.mode === "resize-left" ||
      interaction.mode === "resize-right"
    ) {
      if (interaction.componentType === "image") {
        var startDimensions = Tokens.getImageDimensions(interaction.startRect);
        var rotationRadians = Number(interaction.startRect.rotationDeg || 0) * Math.PI / 180;
        var outwardX;
        var outwardY;
        var baseHalfSize;
        if (interaction.mode === "resize-top") {
          outwardX = Math.sin(rotationRadians);
          outwardY = -Math.cos(rotationRadians);
          baseHalfSize = Math.max(startDimensions.height / 2, 0.001);
        } else if (interaction.mode === "resize-bottom") {
          outwardX = -Math.sin(rotationRadians);
          outwardY = Math.cos(rotationRadians);
          baseHalfSize = Math.max(startDimensions.height / 2, 0.001);
        } else if (interaction.mode === "resize-left") {
          outwardX = -Math.cos(rotationRadians);
          outwardY = -Math.sin(rotationRadians);
          baseHalfSize = Math.max(startDimensions.width / 2, 0.001);
        } else {
          outwardX = Math.cos(rotationRadians);
          outwardY = Math.sin(rotationRadians);
          baseHalfSize = Math.max(startDimensions.width / 2, 0.001);
        }
        var outwardDelta = deltaX * outwardX + deltaY * outwardY;
        state.componentState = {
          x: interaction.startRect.x,
          y: interaction.startRect.y,
          scale: interaction.startRect.scale * Math.max(0.1, (baseHalfSize + outwardDelta) / baseHalfSize),
          rotationDeg: interaction.startRect.rotationDeg
        };
      } else {
        var nextWidth = interaction.startRect.width;
        var nextHeight = interaction.startRect.height;
        if (interaction.mode === "resize-left") {
          nextWidth = interaction.startRect.width - deltaX * 2;
        } else if (interaction.mode === "resize-right") {
          nextWidth = interaction.startRect.width + deltaX * 2;
        } else if (interaction.mode === "resize-top") {
          nextHeight = interaction.startRect.height - deltaY * 2;
        } else if (interaction.mode === "resize-bottom") {
          nextHeight = interaction.startRect.height + deltaY * 2;
        } else {
          nextWidth = interaction.startRect.width + deltaX * 2;
          nextHeight = interaction.startRect.height + deltaY * 2;
        }
        state.componentState = {
          x: interaction.startRect.x,
          y: interaction.startRect.y,
          width: nextWidth,
          height: nextHeight,
          rotationDeg: interaction.startRect.rotationDeg
        };
      }
      return state;
    }

    if (interaction.mode === "rotate") {
      var startAngle = Math.atan2(
        interaction.startClientY - interaction.centerClientY,
        interaction.startClientX - interaction.centerClientX
      );
      var nextAngle = Math.atan2(
        event.clientY - interaction.centerClientY,
        event.clientX - interaction.centerClientX
      );
      state.componentState = interaction.componentType === "image"
        ? {
          x: interaction.startRect.x,
          y: interaction.startRect.y,
          scale: interaction.startRect.scale,
          rotationDeg: interaction.startRect.rotationDeg + (nextAngle - startAngle) * 180 / Math.PI
        }
        : {
          x: interaction.startRect.x,
          y: interaction.startRect.y,
          width: interaction.startRect.width,
          height: interaction.startRect.height,
          rotationDeg: interaction.startRect.rotationDeg + (nextAngle - startAngle) * 180 / Math.PI
        };
      return state;
    }

    if (interaction.componentType === "image") {
      state.componentState = {
        x: interaction.startRect.x + deltaX,
        y: interaction.startRect.y + deltaY,
        scale: interaction.startRect.scale,
        rotationDeg: interaction.startRect.rotationDeg
      };
      return state;
    }

    state.componentState = {
      x: interaction.startRect.x + deltaX,
      y: interaction.startRect.y + deltaY,
      width: interaction.startRect.width,
      height: interaction.startRect.height,
      rotationDeg: interaction.startRect.rotationDeg
    };
    return state;
  }

  function scaleDesignerComponentState(selection, component, factor) {
    var state = {
      tokenId: selection.token.id,
      componentId: component.id,
      componentType: selection.selectedComponentType
    };

    if (selection.selectedComponentType === "image") {
      state.componentState = {
        x: component.x,
        y: component.y,
        scale: component.scale * factor,
        rotationDeg: component.rotationDeg
      };
      return state;
    }

    state.componentState = {
      x: component.x,
      y: component.y,
      width: component.width * factor,
      height: component.height * factor,
      rotationDeg: component.rotationDeg
    };
    return state;
  }

  function setDesignerTransientPreview(preview) {
    designerTransientPreview = preview;
    scheduleDesignerTransientRender();
  }

  function scheduleDesignerTransientRender() {
    if (designerPreviewRenderQueued) {
      return;
    }
    designerPreviewRenderQueued = true;
    runtimeGlobal.requestAnimationFrame(function () {
      designerPreviewRenderQueued = false;
      renderDesignerTransientPreview();
    });
  }

  function renderDesignerTransientPreview(appElement) {
    if (!designerTransientPreview || !mountedStore) {
      return;
    }

    var root = appElement || runtimeGlobal.document.getElementById("app");
    if (!root) {
      return;
    }

    var state = mountedStore.getState();
    var selection = getDesignerSelection(state);
    if (!selection.token || selection.token.id !== designerTransientPreview.tokenId) {
      return;
    }

    var token = Schema.clone(selection.token);
    if (!applyDesignerTransientState(token, designerTransientPreview)) {
      return;
    }

    var previewStage = root.querySelector("[data-preview-stage]");
    if (!previewStage) {
      return;
    }

    previewStage.innerHTML = Renderer.renderTokenSvg(token, state.project, {
      sequenceIndex: 0,
      instanceId: "designer-front",
      interactive: true,
      selectedComponentType: state.ui.selectedComponentType,
      selectedComponentId: state.ui.selectedComponentId
    });
    syncDesignerTransientForm(root, designerTransientPreview);
  }

  function applyDesignerTransientState(token, preview) {
    if (!token || !token.front || !preview) {
      return false;
    }

    var component = getSelectedComponent(token.front, preview.componentType, preview.componentId);
    if (!component) {
      return false;
    }

    if (preview.componentType === "image") {
      Tokens.updateImageComponent(component, {
        x: preview.componentState.x,
        y: preview.componentState.y,
        scale: preview.componentState.scale,
        rotationDeg: preview.componentState.rotationDeg,
        mirrorX: component.mirrorX,
        mirrorY: component.mirrorY
      });
      return true;
    }

    Tokens.updateComponentRect(component, preview.componentState);
    component.rotationDeg = toNumberOrDefault(preview.componentState.rotationDeg, component.rotationDeg);
    return true;
  }

  function syncDesignerTransientForm(appElement, preview) {
    var form = appElement.querySelector(
      preview.componentType === "image"
        ? '[data-form="image-component-settings"]'
        : '[data-form="text-component-settings"]'
    );
    if (!form) {
      return;
    }

    setFormFieldValue(form, "x", preview.componentState.x, 2);
    setFormFieldValue(form, "y", toDisplayCenterY(preview.componentState.y), 2);
    if (preview.componentType === "image") {
      setFormFieldValue(form, "scale", preview.componentState.scale, 2);
      setFormFieldValue(form, "rotationDeg", Math.round(Number(preview.componentState.rotationDeg || 0)));
      setRangeHelpText(form, "scale", Math.round(preview.componentState.scale * 100) + "% of max circle diameter");
      return;
    }

    setFormFieldValue(form, "width", preview.componentState.width, 2);
    setFormFieldValue(form, "height", preview.componentState.height, 2);
    setFormFieldValue(form, "rotationDeg", Math.round(Number(preview.componentState.rotationDeg || 0)));
  }

  function setFormFieldValue(form, name, value, fixedDigits, skipName) {
    var field = form.querySelector('[name="' + name + '"]');
    if (!field) {
      return;
    }
    if (skipName && field.name === skipName) {
      return;
    }
    field.value = typeof fixedDigits === "number" ? Number(value).toFixed(fixedDigits) : String(value);
  }

  function setRangeHelpText(form, name, text) {
    var field = form.querySelector('[name="' + name + '"]');
    if (!field) {
      return;
    }
    var help = field.parentElement ? field.parentElement.querySelector(".field-help") : null;
    if (help) {
      help.textContent = text;
    }
  }

  function syncRenderedFormState(appElement, state) {
    syncDesignerFormState(appElement, state);
    syncPrintSelectionFormState(appElement, state);
  }

  function syncDesignerFormState(appElement, state) {
    var selection = getDesignerSelection(state);
    if (!selection.token || !selection.selectedComponentType) {
      return;
    }

    var component = getSelectedComponent(selection.token.front, selection.selectedComponentType, selection.selectedComponentId);
    if (!component) {
      return;
    }

    if (selection.selectedComponentType === "image") {
      var imageForm = appElement.querySelector('[data-form="image-component-settings"]');
      if (!imageForm) {
        return;
      }
      setFormFieldValue(imageForm, "x", component.x, 2);
      setFormFieldValue(imageForm, "y", toDisplayCenterY(component.y), 2);
      setFormFieldValue(imageForm, "scale", component.scale, 2);
      setFormFieldValue(imageForm, "rotationDeg", Math.round(Number(component.rotationDeg || 0)));
      setRangeHelpText(imageForm, "scale", Math.round(component.scale * 100) + "% of max circle diameter");
      return;
    }

    var textForm = appElement.querySelector('[data-form="text-component-settings"]');
    if (!textForm) {
      return;
    }
    setFormFieldValue(textForm, "x", component.x, 2);
    setFormFieldValue(textForm, "y", toDisplayCenterY(component.y), 2);
    setFormFieldValue(textForm, "width", component.width, 2);
    setFormFieldValue(textForm, "height", component.height, 2);
    setFormFieldValue(textForm, "rotationDeg", Math.round(Number(component.rotationDeg || 0)));
    setFormFieldValue(textForm, "sequenceStart", component.sequenceStart);
    if (textForm.querySelector('[name="sequencePad"]')) {
      setFormFieldValue(textForm, "sequencePad", component.sequencePad);
    }
  }

  function syncPrintSelectionFormState(appElement, state) {
    var printForm = appElement.querySelector('[data-form="print-selections"]');
    if (!printForm) {
      return;
    }
    var activeElement = runtimeGlobal.document && runtimeGlobal.document.activeElement;
    var activeName = activeElement && printForm.contains(activeElement) ? activeElement.name : null;

    Print.getSelectionRows(state.project).forEach(function (row) {
      setFormFieldValue(printForm, "copies-" + row.tokenId, row.copies, null, activeName);
      setFormFieldValue(printForm, "start-" + row.tokenId, row.sequenceStart, null, activeName);
    });
  }

  function bindDelegatedAppHandlers(appElement) {
    if (appDelegatedHandlersBound) {
      return;
    }
    appDelegatedHandlersBound = true;

    appElement.addEventListener("click", function (event) {
      handleDelegatedClick(appElement, event);
    });
    appElement.addEventListener("mousedown", function (event) {
      handleDelegatedMouseDown(event);
    });
    appElement.addEventListener("wheel", function (event) {
      handleDelegatedWheel(event);
    }, { passive: false });
    runtimeGlobal.addEventListener("keydown", handleGlobalKeyDown);
  }

  function handleDelegatedClick(appElement, event) {
    if (!mountedStore) {
      return;
    }

    var tabButton = event.target.closest("[data-tab]");
    if (tabButton && appElement.contains(tabButton)) {
      mountedStore.setActiveTab(tabButton.getAttribute("data-tab"));
      return;
    }

    var actionButton = event.target.closest("[data-action]");
    if (actionButton && appElement.contains(actionButton)) {
      handleActionClick(appElement, actionButton);
      return;
    }

    var previewStage = event.target.closest("[data-preview-stage]");
    if (previewStage && appElement.contains(previewStage)) {
      handlePreviewSelection(event);
    }
  }

  function handleActionClick(appElement, button) {
    var action = button.getAttribute("data-action");
    if (!action) {
      return;
    }

    if (action === "open-settings") {
      mountedStore.setActiveTab("settings");
      return;
    }

    if (action === "toggle-help") {
      toggleHelp();
      return;
    }

    if (action === "close-help") {
      setHelpOpen(false);
      return;
    }

    if (action === "reset-project") {
      resetProject();
      return;
    }

    if (action === "toggle-print-panel") {
      togglePrintPanel(button.getAttribute("data-panel-key"));
      return;
    }

    if (action === "export-project") {
      exportProject();
      return;
    }

    if (action === "import-project") {
      var importInput = appElement.querySelector("[data-import-input]");
      if (importInput) {
        importInput.click();
      }
      return;
    }

    if (action === "close-settings-drawer") {
      mountedStore.updateUi(function (ui) {
        ui.editingColorSequenceId = null;
      });
      return;
    }

    if (action === "new-color-sequence") {
      createColorSequence();
      return;
    }

    if (action === "delete-selected-color-sequence") {
      deleteColorSequence(button.getAttribute("data-sequence-id"));
      return;
    }

    if (action === "add-token") {
      addToken();
      return;
    }

    if (action === "clone-token") {
      cloneToken(button.getAttribute("data-token-id"));
      return;
    }

    if (action === "delete-token") {
      deleteToken(button.getAttribute("data-token-id"));
      return;
    }

    if (action === "add-text") {
      addTextComponent();
      return;
    }

    if (action === "add-image") {
      clickInput(appElement.querySelector("[data-image-upload-input]"));
      return;
    }

    if (action === "replace-image") {
      clickInput(button.closest("form") && button.closest("form").querySelector("[data-replace-image-input]"));
      return;
    }

    if (action === "upload-default-background") {
      clickInput(appElement.querySelector("[data-default-background-input]"));
      return;
    }

    if (action === "upload-token-background") {
      clickInput(appElement.querySelector("[data-token-background-input]"));
      return;
    }

    if (action === "remove-default-background") {
      mountedStore.updateProject(function (project) {
        project.settings.tokenDefaults.backgroundMode = "color";
        project.settings.tokenDefaults.backgroundImageSource = "";
      });
      return;
    }

    if (action === "remove-token-background") {
      var selection = getDesignerSelection(mountedStore.getState());
      if (!selection.token) {
        return;
      }
      mountedStore.updateProject(function (project) {
        var token = findToken(project, selection.token.id);
        if (!token) {
          return;
        }
        token.front.backgroundMode = "color";
        token.front.backgroundImageSource = "";
      });
      return;
    }

    if (action === "delete-component") {
      deleteSelectedComponent();
      return;
    }

    if (action === "move-component-up" || action === "move-component-down") {
      moveSelectedComponent(action === "move-component-up" ? "up" : "down");
      return;
    }

    if (action === "select-preview-page") {
      mountedStore.updateUi(function (ui) {
        ui.selectedPrintPreviewPage = Number(button.getAttribute("data-page-index")) || 0;
      });
      return;
    }

    if (action === "print-layout") {
      PrintPanel.printCurrentLayout(mountedStore);
    }
  }

  function handlePreviewSelection(event) {
    var componentElement = event.target.closest("[data-component-id]");
    if (componentElement) {
      mountedStore.updateUi(function (ui) {
        ui.selectedComponentType = componentElement.getAttribute("data-component-type");
        ui.selectedComponentId = componentElement.getAttribute("data-component-id");
      });
      return;
    }

    mountedStore.updateUi(function (ui) {
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function handleDelegatedMouseDown(event) {
    if (!mountedStore) {
      return;
    }

    var dragTarget = event.target.closest("[data-drag-mode]");
    if (!dragTarget) {
      return;
    }

    var selection = getDesignerSelection(mountedStore.getState());
    if (!selection.token) {
      return;
    }

    event.preventDefault();
    var componentElement = event.target.closest("[data-component-id]");
    if (!componentElement) {
      return;
    }

    var componentId = componentElement.getAttribute("data-component-id");
    var componentType = componentElement.getAttribute("data-component-type");
    var mode = dragTarget.getAttribute("data-drag-mode") || "move";
    var component = getSelectedComponent(selection.token.front, componentType, componentId);
    if (!component) {
      return;
    }

    var svgElement = event.target.ownerSVGElement;
    var previewRect = svgElement.getBoundingClientRect();
    designerInteraction = {
      tokenId: selection.token.id,
      componentId: componentId,
      componentType: componentType,
      mode: mode,
      startClientX: event.clientX,
      startClientY: event.clientY,
      previewRect: previewRect,
      startRect: {
        x: component.x,
        y: component.y,
        width: component.width,
        height: component.height,
        scale: component.scale,
        aspectRatio: component.aspectRatio,
        rotationDeg: Number(component.rotationDeg || 0)
      },
      centerClientX: previewRect.left + (50 + component.x * 100) / 100 * previewRect.width,
      centerClientY: previewRect.top + (50 + component.y * 100) / 100 * previewRect.height
    };

    mountedStore.updateUi(function (ui) {
      ui.selectedComponentType = componentType;
      ui.selectedComponentId = componentId;
    });
  }

  function handleDelegatedWheel(event) {
    if (!mountedStore || !event.target.closest("[data-preview-stage]")) {
      return;
    }

    var selection = getDesignerSelection(mountedStore.getState());
    if (!selection.token || !selection.selectedComponentType) {
      return;
    }

    var component = findComponent(mountedStore.getState().project, selection, selection.selectedComponentType);
    if (!component) {
      return;
    }

    event.preventDefault();
    var factor = Math.pow(1.0015, -event.deltaY);
    setDesignerTransientPreview(scaleDesignerComponentState(selection, component, factor));
    scheduleDesignerPersist();
  }

  function clickInput(input) {
    if (input) {
      input.click();
    }
  }

  function handleGlobalKeyDown(event) {
    if (!mountedStore) {
      return;
    }

    var isHelpToggle = event.key === "?" || (event.key === "/" && event.shiftKey);
    if (isHelpToggle && !shouldIgnoreHotkeysForTarget(event.target)) {
      event.preventDefault();
      toggleHelp();
      return;
    }

    if (shouldIgnoreHotkeysForTarget(event.target)) {
      return;
    }

    var state = mountedStore.getState();
    if (event.key === "Escape") {
      if (state.ui.showHelp) {
        event.preventDefault();
        setHelpOpen(false);
        return;
      }

      if (state.ui.activeTab === "designer" && state.ui.selectedComponentId) {
        event.preventDefault();
        clearSelectedComponent();
      }
      return;
    }

    if (state.ui.showHelp) {
      return;
    }

    if (event.ctrlKey || event.metaKey || event.altKey) {
      return;
    }

    if (event.key === "Delete" || event.key === "Backspace") {
      if (state.ui.activeTab === "designer" && state.ui.selectedComponentId) {
        event.preventDefault();
        deleteSelectedComponent();
      }
      return;
    }

    if (state.ui.activeTab !== "designer") {
      return;
    }

    if (event.key === "t" || event.key === "T") {
      if (getDesignerSelection(state).token) {
        event.preventDefault();
        addTextComponent();
      }
      return;
    }

    if ((event.key === "i" || event.key === "I") && getDesignerSelection(state).token) {
      event.preventDefault();
      clickInput(runtimeGlobal.document.querySelector("[data-image-upload-input]"));
    }
  }

  function shouldIgnoreHotkeysForTarget(target) {
    if (!target || !(target instanceof runtimeGlobal.Element)) {
      return false;
    }

    if (target.closest("[data-help-dialog]")) {
      return false;
    }

    var editable = target.closest("input, textarea, select, [contenteditable='true']");
    if (!editable) {
      return false;
    }

    if (editable.tagName === "INPUT") {
      var inputType = (editable.getAttribute("type") || "text").toLowerCase();
      return ["button", "checkbox", "file", "radio", "range"].indexOf(inputType) === -1;
    }

    return true;
  }

  function toggleHelp() {
    setHelpOpen(!(mountedStore.getState().ui.showHelp === true));
  }

  function setHelpOpen(isOpen) {
    mountedStore.updateUi(function (ui) {
      ui.showHelp = isOpen;
    });
  }

  function clearSelectedComponent() {
    mountedStore.updateUi(function (ui) {
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function resetProject() {
    if (!runtimeGlobal.confirm("Reset the current project? This clears saved tokens and sequences.")) {
      return;
    }

    mountedStore.replaceProject(Schema.createDefaultProject());
    mountedStore.updateUi(function (ui) {
      ui.editingColorSequenceId = null;
      ui.selectedColorSequenceId = null;
      ui.selectedTokenId = null;
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
      ui.selectedPrintPreviewPage = 0;
      ui.showHelp = false;
    });
  }

  function togglePrintPanel(panelKey) {
    mountedStore.updateUi(function (ui) {
      ui.printPanels = ui.printPanels || {};
      ui.printPanels[panelKey] = !(ui.printPanels[panelKey] !== false);
    });
  }

  function exportProject() {
    var state = mountedStore.getState();
    var safeName = state.project.meta && state.project.meta.name && state.project.meta.name !== "Untitled Project"
      ? state.project.meta.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "")
      : "monster-mint";
    Utils.downloadTextFile((safeName || "monster-mint") + ".json", JSON.stringify(state.project, null, 2));
  }

  function createColorSequence() {
    var sequence = Sequences.createColorSequence({
      name: "New color sequence",
      valuesText: "#8a1c1c\n#3b5b92"
    });
    mountedStore.updateProject(function (project) {
      project.sequences.color.push(sequence);
    });
    mountedStore.updateUi(function (ui) {
      ui.selectedColorSequenceId = sequence.id;
      ui.editingColorSequenceId = sequence.id;
    });
  }

  function deleteColorSequence(sequenceId) {
    if (!sequenceId) {
      return;
    }

    mountedStore.updateProject(function (project) {
      project.sequences.color = project.sequences.color.filter(function (sequence) {
        return sequence.id !== sequenceId;
      });
    });
    mountedStore.updateUi(function (ui) {
      ui.editingColorSequenceId = null;
      if (ui.selectedColorSequenceId === sequenceId) {
        ui.selectedColorSequenceId = null;
      }
    });
  }

  function addToken() {
    var token = Tokens.createTokenTemplate({});
    applyTokenDefaults(token, mountedStore.getState().project.settings.tokenDefaults);
    mountedStore.updateProject(function (project) {
      project.tokens.push(token);
    });
    mountedStore.updateUi(function (ui) {
      ui.activeTab = "designer";
      ui.selectedTokenId = token.id;
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function cloneToken(tokenId) {
    var sourceToken = findToken(mountedStore.getState().project, tokenId);
    if (!sourceToken) {
      return;
    }

    var token = Tokens.cloneTokenTemplate(sourceToken);
    mountedStore.updateProject(function (project) {
      project.tokens.push(token);
    });
    mountedStore.updateUi(function (ui) {
      ui.activeTab = "designer";
      ui.selectedTokenId = token.id;
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function deleteToken(tokenId) {
    if (!runtimeGlobal.confirm("Delete the selected token?")) {
      return;
    }

    mountedStore.updateProject(function (project) {
      project.tokens = project.tokens.filter(function (token) {
        return token.id !== tokenId;
      });
    });
    mountedStore.updateUi(function (ui) {
      ui.selectedTokenId = ui.selectedTokenId === tokenId ? null : ui.selectedTokenId;
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function addTextComponent() {
    var selection = getDesignerSelection(mountedStore.getState());
    if (!selection.token) {
      return;
    }

    var face = selection.token.front;
    var textDefaults = mountedStore.getState().project.settings.textDefaults;
    var component = Tokens.createTextComponent({
      name: "Text #" + (face.texts.length + 1),
      zIndex: Tokens.getNextComponentZ(face),
      fontFamily: textDefaults.fontFamily,
      fontWeight: textDefaults.fontWeight,
      colorMode: textDefaults.colorMode,
      color: textDefaults.color,
      colorSequenceRef: textDefaults.colorSequenceRef,
      textBorder: {
        width: textDefaults.textBorder.width,
        colorMode: textDefaults.textBorder.colorMode,
        color: textDefaults.textBorder.color,
        colorSequenceRef: textDefaults.textBorder.colorSequenceRef
      }
    });
    mountedStore.updateProject(function (project) {
      var token = findToken(project, selection.token.id);
      token.front.texts.push(component);
    });
    mountedStore.updateUi(function (ui) {
      ui.selectedComponentType = "text";
      ui.selectedComponentId = component.id;
    });
  }

  function deleteSelectedComponent() {
    var selection = getDesignerSelection(mountedStore.getState());
    if (!selection.token || !selection.selectedComponentId || !DesignerPanel.canDeleteSelectedComponent(selection)) {
      return;
    }

    mountedStore.updateProject(function (project) {
      var token = findToken(project, selection.token.id);
      var face = token.front;
      face.images = face.images.filter(function (component) {
        return component.id !== selection.selectedComponentId;
      });
      face.texts = face.texts.filter(function (component) {
        return component.id !== selection.selectedComponentId;
      });
    });
    mountedStore.updateUi(function (ui) {
      ui.selectedComponentType = null;
      ui.selectedComponentId = null;
    });
  }

  function moveSelectedComponent(direction) {
    var selection = getDesignerSelection(mountedStore.getState());
    if (!selection.token || !selection.selectedComponentId || !selection.selectedComponentType) {
      return;
    }

    mountedStore.updateProject(function (project) {
      var token = findToken(project, selection.token.id);
      if (!token) {
        return;
      }
      Tokens.moveComponentZ(token.front, selection.selectedComponentType, selection.selectedComponentId, direction);
    });
  }

  function commitDesignerTransientPreview() {
    if (!mountedStore || !designerTransientPreview) {
      return;
    }

    var preview = designerTransientPreview;
    designerTransientPreview = null;
    mountedStore.updateProject(function (project) {
      var token = findToken(project, preview.tokenId);
      if (!token) {
        return;
      }
      applyDesignerTransientState(token, preview);
    });
  }

  function captureFocusState(appElement) {
    if (!appElement || !appElement.contains(runtimeGlobal.document.activeElement)) {
      return null;
    }

    var active = runtimeGlobal.document.activeElement;
    if (!active || !active.name) {
      return null;
    }

    var form = active.closest("[data-form]");
    return {
      form: form ? form.getAttribute("data-form") : null,
      name: active.name,
      selectionStart: typeof active.selectionStart === "number" ? active.selectionStart : null,
      selectionEnd: typeof active.selectionEnd === "number" ? active.selectionEnd : null
    };
  }

  function restoreFocusState(appElement, focusState) {
    if (!focusState || !focusState.name) {
      return;
    }

    var selector = (focusState.form ? '[data-form="' + focusState.form + '"] ' : "") + '[name="' + focusState.name + '"]';
    var nextField = appElement.querySelector(selector);
    if (!nextField || typeof nextField.focus !== "function") {
      return;
    }

    nextField.focus({ preventScroll: true });
    if (typeof focusState.selectionStart === "number" && typeof nextField.setSelectionRange === "function") {
      nextField.setSelectionRange(focusState.selectionStart, focusState.selectionEnd == null ? focusState.selectionStart : focusState.selectionEnd);
    }
  }

  async function mount() {
    var appElement = document.getElementById("app");
    renderLoadingState(appElement);
    var persistence = Storage.createBrowserPersistence({
      indexedDB: runtimeGlobal.indexedDB,
      storage: runtimeGlobal.localStorage
    });
    var store = await State.createStore({ persistence: persistence });
    mountedStore = store;
    mountedAppView = createAppView(appElement);
    bindDelegatedAppHandlers(appElement);
    SettingsPanel.bindTransferActions(appElement, store, SETTINGS_PANEL_HELPERS);
    store.subscribe(function () {
      render(mountedAppView, store);
    });
    bindGlobalPointerHandlers();
    bindGlobalResizeHandlers(appElement);
    render(mountedAppView, store);
  }

  function renderLoadingState(appElement) {
    appElement.innerHTML = '<main class="app-shell"><section class="tab-panel is-active"><div class="empty-state"><h2>Loading Project</h2><p>Opening browser storage...</p></div></section></main>';
  }

  function bindGlobalPointerHandlers() {
    if (bindGlobalPointerHandlers.didBind) {
      return;
    }
    bindGlobalPointerHandlers.didBind = true;
    runtimeGlobal.addEventListener("mousemove", handleGlobalPointerMove);
    runtimeGlobal.addEventListener("mouseup", handleGlobalPointerUp);
  }

  function bindGlobalResizeHandlers(appElement) {
    if (bindGlobalResizeHandlers.didBind) {
      return;
    }
    bindGlobalResizeHandlers.didBind = true;
    runtimeGlobal.addEventListener("resize", function () {
      if (designerResizeQueued) {
        return;
      }
      designerResizeQueued = true;
      runtimeGlobal.requestAnimationFrame(function () {
        designerResizeQueued = false;
        syncDesignerDrawerHeight(appElement);
      });
    });
  }

  if (typeof document !== "undefined") {
    document.addEventListener("DOMContentLoaded", function () {
      mount().catch(function (error) {
        console.error(error);
        var appElement = document.getElementById("app");
        if (appElement) {
          appElement.innerHTML = '<main class="app-shell"><section class="tab-panel is-active"><div class="empty-state"><h2>Storage Error</h2><p>Monster Mint could not open browser storage. Export any existing project JSON and reload the page.</p></div></section></main>';
        }
      });
    });
  }

  return {
    mount: mount
  };
});

    </script>
  </body>
</html>
