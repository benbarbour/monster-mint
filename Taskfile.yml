version: "3"

tasks:
  default:
    desc: Show the available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the single-file distributable
    cmds:
      - npm run build

  test:
    desc: Run the automated test suite
    cmds:
      - npm test

  test:e2e:
    desc: Run the Playwright headless browser tests
    cmds:
      - npm run test:e2e

  serve:
    desc: Build the app and serve dist/ locally on the first free port starting at 4173
    deps:
      - build
    cmds:
      - node scripts/serve.mjs
